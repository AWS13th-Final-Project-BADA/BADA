name: Deploy Frontend (dev)

on:
  push:
    branches: [develop]
    paths:
      - ".dockerignore"
      - ".github/workflows/deploy-dev-frontend.yml"
      - "frontend/**"
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  AWS_ROLE_ARN: arn:aws:iam::165749212250:role/bada-dev-github-actions-deploy-role
  ECR_REPOSITORY: bada-dev-frontend
  ECS_CLUSTER: bada-dev-cluster
  ECS_SERVICE: bada-dev-frontend
  ECS_TASK_DEFINITION_FAMILY: bada-dev-frontend
  CONTAINER_NAME: frontend
  FRONTEND_URL: https://badasoft.com/api/health

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: ecr
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${registry}"
          echo "registry=${registry}" >> "${GITHUB_OUTPUT}"

      - name: Build and push frontend image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${GITHUB_SHA::12}"
          image_uri="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${image_tag}"
          latest_uri="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:latest"

          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --file frontend/Dockerfile \
            --tag "${image_uri}" \
            --tag "${latest_uri}" \
            --push \
            .

          echo "image_uri=${image_uri}" >> "${GITHUB_OUTPUT}"

      - name: Render task definition
        id: task
        shell: bash
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION_FAMILY}" \
            --query "taskDefinition" \
            > current-task-definition.json

          jq \
            --arg container_name "${CONTAINER_NAME}" \
            --arg image_uri "${{ steps.image.outputs.image_uri }}" \
            '
            .containerDefinitions |= map(
              if .name == $container_name
              then .image = $image_uri
              else .
              end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            ' current-task-definition.json > new-task-definition.json

          task_definition_arn="$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"

          echo "task_definition_arn=${task_definition_arn}" >> "${GITHUB_OUTPUT}"

      - name: Deploy frontend service
        shell: bash
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.task.outputs.task_definition_arn }}" \
            --desired-count 1

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Verify frontend health
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if curl -fsS "${FRONTEND_URL}"; then
              echo
              echo "Frontend health check succeeded."
              exit 0
            fi
            echo "Frontend health check failed. Retry ${attempt}/30..."
            sleep 10
          done

          echo "Frontend health check failed after retries."
          exit 1
