name: Deploy Dev Backend

on:
  push:
    branches: [develop]
    paths:
      - ".dockerignore"
      - ".github/workflows/deploy-dev.yml"
      - "backend/**"
      - "worker/**"
      - "infra/*.tf"
      - "infra/terraform.tfvars.example"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev-backend
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  AWS_ROLE_ARN: arn:aws:iam::165749212250:role/bada-dev-github-actions-deploy-role
  ECR_REPOSITORY: bada-dev-backend
  ECS_CLUSTER: bada-dev-cluster
  ECS_SERVICE: bada-dev-backend
  ECS_TASK_DEFINITION_FAMILY: bada-dev-backend
  CONTAINER_NAME: backend
  BACKEND_HEALTH_URL: https://api.badasoft.com/health

jobs:
  deploy-backend:
    name: Build, push, and deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: ecr
        shell: bash
        run: |
          set -euo pipefail
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${registry}"
          echo "registry=${registry}" >> "${GITHUB_OUTPUT}"

      - name: Build and push backend image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_tag="${GITHUB_SHA::12}"
          image_uri="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${image_tag}"
          latest_uri="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:latest"

          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --file backend/Dockerfile \
            --tag "${image_uri}" \
            --tag "${latest_uri}" \
            --push \
            .

          echo "image_uri=${image_uri}" >> "${GITHUB_OUTPUT}"

      - name: Render task definition
        id: task
        shell: bash
        run: |
          set -euo pipefail
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION_FAMILY}" \
            --query "taskDefinition" \
            > current-task-definition.json

          jq \
            --arg container_name "${CONTAINER_NAME}" \
            --arg image_uri "${{ steps.image.outputs.image_uri }}" \
            '
            .containerDefinitions |= map(
              if .name == $container_name
              then .image = $image_uri
              else .
              end
            )
            | del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            ' current-task-definition.json > new-task-definition.json

          task_definition_arn="$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"

          echo "task_definition_arn=${task_definition_arn}" >> "${GITHUB_OUTPUT}"

      - name: Deploy backend service
        shell: bash
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.task.outputs.task_definition_arn }}"

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Verify ALB health
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            status_code="$(curl \
              --silent \
              --show-error \
              --max-time 10 \
              --output health-response.json \
              --write-out "%{http_code}" \
              "${BACKEND_HEALTH_URL}" || true)"

            if [[ "${status_code}" == "200" ]]; then
              cat health-response.json
              echo
              echo "Backend HTTPS health check succeeded."
              exit 0
            fi
            echo "Backend HTTPS health check returned ${status_code:-curl-error}. Retry ${attempt}/30..."
            sleep 10
          done

          echo "Backend HTTPS health check failed after retries."
          exit 1
