name: Build Mobile (EAS Preview)

# mobile-native/ 변경이 develop에 push되면 워크플로우가 트리거되지만, 'eas-build' 환경의
# Required reviewers 승인 전까지는 빌드가 대기한다(이 동안 EAS 빌드 횟수 차감 0).
# 승인(Approve) 시에만 EAS Build가 제출되어 빌드 1회가 차감된다. 거부/미승인/만료 시 차감 0.
# 수동 실행(workflow_dispatch)도 동일하게 승인이 필요하다.
# EAS Build는 Expo 클라우드에서 실행되며, EXPO_TOKEN으로 인증한다.
# 빌드 완료/실패 시 EAS_DISCORD_WEBHOOK_URL(설정된 경우)로 디스코드 알림을 보낸다.
# ⚠️ 게이트 활성화: GitHub Settings → Environments → eas-build → Required reviewers 등록 필요.

on:
  push:
    branches: [develop]
    paths:
      - "mobile-native/**"
      - ".github/workflows/build-mobile.yml"
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile (preview or production)"
        required: false
        default: "preview"
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: build-mobile-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIR: mobile-native

jobs:
  build:
    name: EAS Build (Android)
    runs-on: ubuntu-latest
    # 승인 게이트: 이 job은 'eas-build' 환경의 Required reviewers 승인 전까지 대기한다.
    # 승인 전에는 eas build가 실행되지 않으므로 EAS 빌드 횟수가 차감되지 않는다.
    # ⚠️ GitHub Settings → Environments → eas-build → Required reviewers 등록이 있어야 실제로 게이트가 걸린다.
    environment: eas-build
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-native/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Validate translations
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run check:i18n

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=preview" >> "$GITHUB_OUTPUT"
          fi

      - name: Run EAS Build
        id: build
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -o pipefail
          # 빌드 완료까지 대기하고 결과(JSON)를 받는다. (--no-wait 제거: 완성 링크를 얻기 위함)
          eas build \
            --platform android \
            --profile ${{ steps.profile.outputs.value }} \
            --non-interactive \
            --json | tee build-output.json
          BUILD_ID=$(jq -r '.[0].id // empty' build-output.json)
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "build_url=https://expo.dev/accounts/dkdevelop/projects/bada-mobile-native/builds/$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.EAS_DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          PROFILE: ${{ steps.profile.outputs.value }}
          BUILD_URL: ${{ steps.build.outputs.build_url }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "EAS_DISCORD_WEBHOOK_URL 미설정 — 디스코드 알림 스킵"
            exit 0
          fi
          if [ "$STATUS" = "success" ] && [ -n "$BUILD_URL" ]; then
            CONTENT=$(printf '📱 BADA 모바일 새 빌드 완료 (%s)\n브랜치: %s\n커밋: %s\n설치·QR: %s' "$PROFILE" "$REF_NAME" "$SHA" "$BUILD_URL")
          else
            CONTENT=$(printf '⚠️ BADA 모바일 빌드 실패 (%s)\n브랜치: %s\n로그: %s' "$PROFILE" "$REF_NAME" "$RUN_URL")
          fi
          jq -nc --arg c "$CONTENT" '{content: $c}' | curl -sf -H "Content-Type: application/json" -d @- "$WEBHOOK"
