global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "bada-backend"
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ["api.${domain_name}:443"]
        labels:
          service: "backend"
