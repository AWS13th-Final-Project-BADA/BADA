global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "bada-backend"
    scheme: https
    tls_config:
      insecure_skip_verify: true
    metrics_path: /metrics
    static_configs:
      - targets: ["api.${domain_name}:443"]
        labels:
          service: "backend"

  - job_name: "bada-worker"
    scheme: http
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["worker.${service_discovery_namespace}"]
        type: A
        port: 9090
